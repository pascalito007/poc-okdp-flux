# ============================================================
# BOOTSTRAP — apply this file once, never touch it again.
#
#   kubectl apply -f poc/gitrepository.yaml
#   kubectl apply -f poc/poc-bootstrap.yaml
#
# poc-root watches path ./ which renders:
#   - platform-vars.yaml      → ConfigMap (vars for substituteFrom)
#   - kustomization-root.yaml → poc-sources, poc-spark-history-server,
#                               poc-hive-metastore Kustomization CRs
#
# From this point, ALL changes go through git:
#   - Toggle proxy:     edit path in kustomization-root.yaml → push
#   - Change a var:     edit platform-vars.yaml → push
#   - Upgrade a chart:  edit helmrelease-*.yaml → push
# ============================================================
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: poc-root
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: okdp-sandbox-poc
  path: ./
  prune: true
