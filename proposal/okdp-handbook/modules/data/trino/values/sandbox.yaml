# Trino values for OKDP Sandbox
# Chart: trinodb/trino v1.39.1
#
# Requires:
#   - Secret "creds-trino-s3" with keys: S3_ACCESS_KEY, S3_SECRET_ACCESS
#   - Secret "creds-oidc" with keys: client_id, client_secret
#   - Secret "certs-bundle" (trust-manager CA bundle)
#   - Hive Metastore running at thrift://hive-metastore.default.svc.cluster.local:9083
#   - SeaweedFS S3 endpoint accessible

image:
  repository: trinodb/trino
  tag: 475

catalogs:
  tpch: |
    connector.name=tpch
    tpch.splits-per-node=4
  tpcds: |
    connector.name=tpcds
    tpcds.splits-per-node=4
  lakehouse: |
    connector.name=hive
    hive.metastore.uri=thrift://hive-metastore.default.svc.cluster.local:9083
    hive.metastore.username=trino
    hive.non-managed-table-writes-enabled=true
    fs.native-s3.enabled=true
    s3.region=us-east-1
    s3.path-style-access=true
    s3.endpoint=https://seaweedfs-seaweedfs-default.okdp.sandbox
    s3.aws-access-key=${ENV:S3_ACCESS_KEY}
    s3.aws-secret-key=${ENV:S3_SECRET_ACCESS}

envFrom:
  - secretRef:
      name: creds-trino-s3
env:
  - name: OAUTH_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: creds-oidc
        key: client_id
  - name: OAUTH_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: creds-oidc
        key: client_secret

server:
  workers: 3
  node:
    environment: sandbox
  config:
    coordinator: "true"
    node-scheduler.include-coordinator: "true"
    discovery-server.enabled: "true"
    path: /etc/trino
    https:
      enabled: true
      port: 8443
      keystore:
        path: "/etc/trino/generated/tls.pem"
  coordinatorExtraConfig: |
    http-server.process-forwarded=true
    web-ui.authentication.type=oauth2
    http-server.authentication.oauth2.issuer=https://keycloak.okdp.sandbox/realms/master
    http-server.authentication.oauth2.client-id=${ENV:OAUTH_CLIENT_ID}
    http-server.authentication.oauth2.client-secret=${ENV:OAUTH_CLIENT_SECRET}
    http-server.authentication.oauth2.auth-url=https://keycloak.okdp.sandbox/realms/master/protocol/openid-connect/auth
    http-server.authentication.oauth2.token-url=https://keycloak.okdp.sandbox/realms/master/protocol/openid-connect/token
    http-server.authentication.oauth2.scopes=openid,email,profile,groups
    deprecated.http-server.authentication.oauth2.groups-field=groups

coordinator:
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "8Gi"
  additionalVolumes:
    - name: generated-files
      emptyDir: {}
    - name: cacerts
      secret:
        secretName: certs-bundle
    - name: trino-tls
      secret:
        secretName: trinodb-tls
  additionalVolumeMounts:
    - name: generated-files
      mountPath: /etc/trino/generated
      readOnly: false
    - name: cacerts
      mountPath: /cacerts
    - name: trino-tls
      mountPath: /trino-tls
  additionalJVMConfig:
    - "-Djavax.net.ssl.trustStore=/cacerts/bundle.p12"
    - "-Djavax.net.ssl.trustStorePassword="

worker:
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"
  additionalVolumes:
    - name: generated-files
      emptyDir: {}
    - name: cacerts
      secret:
        secretName: certs-bundle
    - name: trino-tls
      secret:
        secretName: trinodb-tls
  additionalVolumeMounts:
    - name: generated-files
      mountPath: /etc/trino/generated
      readOnly: false
    - name: cacerts
      mountPath: /cacerts
    - name: trino-tls
      mountPath: /trino-tls
  additionalJVMConfig:
    - "-Djavax.net.ssl.trustStore=/cacerts/bundle.p12"
    - "-Djavax.net.ssl.trustStorePassword="

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "default-issuer"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: trino-default.okdp.sandbox
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - trino-default.okdp.sandbox
      secretName: trinodb-tls

initContainers:
  coordinator:
    - name: init-tls
      image: busybox:1.36
      command:
        [
          "sh",
          "-c",
          "cat /trino-tls/tls.crt /trino-tls/tls.key > /etc/trino/generated/tls.pem",
        ]
      volumeMounts:
        - name: trino-tls
          mountPath: "/trino-tls"
        - name: generated-files
          mountPath: "/etc/trino/generated"
  worker:
    - name: init-tls
      image: busybox:1.36
      command:
        [
          "sh",
          "-c",
          "cat /trino-tls/tls.crt /trino-tls/tls.key > /etc/trino/generated/tls.pem",
        ]
      volumeMounts:
        - name: trino-tls
          mountPath: "/trino-tls"
        - name: generated-files
          mountPath: "/etc/trino/generated"
