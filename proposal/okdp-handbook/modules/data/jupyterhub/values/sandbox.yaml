# JupyterHub values for OKDP Sandbox
# Chart: jupyterhub/jupyterhub 4.3.1
#
# Requires:
#   - Secret "creds-oidc" with keys: client_id, client_secret
#   - Secret "creds-jupyter-s3" with keys: S3_ACCESS_KEY, S3_SECRET_KEY
#   - Secret "creds-examples-s3" with keys: S3_ACCESS_KEY, S3_SECRET_KEY
#   - Keycloak OIDC endpoint accessible
#   - SeaweedFS S3 endpoint accessible
#   - Spark ServiceAccount "spark" created

fullnameOverride: "jupyterhub"
nameOverride: "jupyterhub"

hub:
  extraEnv:
    OAUTH_CLIENT_ID:
      valueFrom:
        secretKeyRef:
          name: creds-oidc
          key: client_id
    OAUTH_CLIENT_SECRET:
      valueFrom:
        secretKeyRef:
          name: creds-oidc
          key: client_secret
  config:
    Authenticator:
      auto_login: true
    GenericOAuthenticator:
      oauth_callback_url: https://jupyter-default.okdp.sandbox/hub/oauth_callback
      authorize_url: https://keycloak.okdp.sandbox/realms/master/protocol/openid-connect/auth
      token_url: https://keycloak.okdp.sandbox/realms/master/protocol/openid-connect/token
      userdata_url: https://keycloak.okdp.sandbox/realms/master/protocol/openid-connect/userinfo
      validate_server_cert: false
      login_service: keycloak
      claim_groups_key: groups
      manage_groups: true
      admin_groups:
        - "admins"
      allowed_groups:
        - "admins"
      username_key: preferred_username
      scope:
        - openid
        - groups
    JupyterHub:
      authenticator_class: generic-oauth
  networkPolicy:
    enabled: false
  image:
    pullPolicy: Always
    name: quay.io/jupyterhub/k8s-hub
    tag: "4.3.1"
  db:
    type: sqlite-pvc
    pvc:
      storage: 1Gi
      storageClassName: "standard"

rbac:
  create: true

cull:
  enabled: false

proxy:
  service:
    type: ClusterIP

ingress:
  enabled: true
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "default-issuer"
  ingressClassName: nginx
  hosts:
    - jupyter-default.okdp.sandbox
  tls:
    - secretName: jupyterhub-tls
      hosts:
        - jupyter-default.okdp.sandbox

scheduling:
  userScheduler:
    enabled: false
  userPlaceholder:
    enabled: false

singleuser:
  podNameTemplate: "jupyterhub-{username}{servername}"
  image:
    name: quay.io/okdp/jupyter/all-spark-notebook
    tag: "spark-3.5.6-python-3.11-java-17-scala-2.12"
  startTimeout: 600
  extraEnv:
    NB_USER: "$(JUPYTERHUB_USER)"
    NB_UID: "1001"
    NB_GID: "100"
    CHOWN_HOME: "yes"
    CHOWN_HOME_OPTS: "-R"
    JUPYTER_ENABLE_LAB: "yes"
    EDITOR: "vim"
    PYTHONWARNINGS: "ignore:Unverified HTTPS request"
    FS_S3_ENDPOINT_URL: "https://seaweedfs-seaweedfs-default.okdp.sandbox"
    FS_S3_ACCESS_KEY:
      valueFrom:
        secretKeyRef:
          name: "creds-jupyter-s3"
          key: "S3_ACCESS_KEY"
    FS_S3_SECRET_KEY:
      valueFrom:
        secretKeyRef:
          name: "creds-jupyter-s3"
          key: "S3_SECRET_KEY"
    POD_IP:
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
  cpu:
    limit: 1
    guarantee: 0.5
  memory:
    limit: 2G
    guarantee: 1G
  profileList:
    - display_name: "🪶 Minimal Python"
      description: "Lightweight image with only Python 3.12"
      kubespawner_override:
        image: quay.io/okdp/jupyter/minimal-notebook:python-3.12.12-hub-5.4.2-lab-4.5.0
        image_pull_policy: Always
    - display_name: "📊 Scientific Python"
      description: "Includes Git, Pandas, NumPy, S3 browser, and Trino SQL support."
      kubespawner_override:
        image: quay.io/okdp/jupyter/scipy-notebook:python-3.12.12-hub-5.4.2-lab-4.5.0
        image_pull_policy: Always
    - display_name: "🔥 PySpark"
      description: "Apache Spark big data processing"
      default: true
      kubespawner_override:
        image_pull_policy: Always
  serviceAccountName: spark
  storage:
    homeMountPath: "/home/{username}"
    dynamic:
      storageClass: standard
      pvcNameTemplate: "jupyterhub-claim-{username}{servername}"
      volumeNameTemplate: "jupyterhub-volume-{username}{servername}"
    type: dynamic
    extraVolumes:
      - name: creds-examples-s3
        secret:
          secretName: creds-examples-s3
    extraVolumeMounts:
      - name: creds-examples-s3
        mountPath: "/var/run/secrets/examples/s3"
        readOnly: true
  cloudMetadata:
    blockWithIptables: false
  uid: 0
  fsGid: 100
  extraPodConfig:
    automount_service_account_token: true
    terminationGracePeriodSeconds: 120
  networkPolicy:
    enabled: false

prePuller:
  hook:
    enabled: false
  continuous:
    enabled: false
