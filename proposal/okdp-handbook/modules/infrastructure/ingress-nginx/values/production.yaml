# ingress-nginx values for Production environments
# Chart: ingress-nginx/ingress-nginx 4.12.1
#
# Use LoadBalancer service type for cloud environments.
# Adjust resources and replicas for production traffic.

controller:
  replicaCount: 2

  service:
    type: LoadBalancer
    # annotations:
    #   service.beta.kubernetes.io/aws-load-balancer-type: nlb  # AWS
    #   service.beta.kubernetes.io/azure-load-balancer-internal: "true"  # Azure

  config:
    proxy-body-size: "130m"
    proxy-connect-timeout: "300"
    proxy-read-timeout: "300"
    proxy-send-timeout: "300"

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  admissionWebhooks:
    enabled: true

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
