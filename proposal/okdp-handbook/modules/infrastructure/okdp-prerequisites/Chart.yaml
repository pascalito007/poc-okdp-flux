# OKDP Infrastructure Prerequisites — Umbrella Helm Chart
#
# Deploys ALL infrastructure prerequisites in one shot:
#   helm dependency build
#   helm install okdp-prerequisites . -n okdp-system --create-namespace -f values/sandbox.yaml
#
# Post-install: apply manifests/ for ClusterIssuers, PostgreSQL cluster, secrets, and Keycloak realm
apiVersion: v2
name: okdp-prerequisites
description: Umbrella chart that deploys all OKDP infrastructure prerequisites
version: 1.0.0
type: application

dependencies:
  - name: cert-manager
    version: "v1.17.1"
    repository: "https://charts.jetstack.io"
    condition: cert-manager.enabled

  - name: ingress-nginx
    version: "4.12.1"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingress-nginx.enabled

  - name: cloudnative-pg
    version: "0.23.0"
    repository: "https://cloudnative-pg.github.io/charts"
    condition: cloudnative-pg.enabled

  - name: keycloakx
    version: "2.5.1"
    repository: "https://codecentric.github.io/helm-charts"
    condition: keycloakx.enabled

  - name: seaweedfs
    version: "4.0.407"
    repository: "https://seaweedfs.github.io/seaweedfs/helm"
    condition: seaweedfs.enabled
