# Self-signed CA bootstrap for OKDP
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: okdp-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: "OKDP Sandbox Self-Signed CA"
  subject:
    organizations:
      - OKDP
    countries:
      - FR
  duration: 8760h
  privateKey:
    algorithm: ECDSA
    size: 256
  secretName: default-issuer
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: default-issuer
spec:
  ca:
    secretName: default-issuer
