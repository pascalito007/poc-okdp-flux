# Role: Storage (S3-compatible object storage)
# Deploys SeaweedFS with S3 API, buckets, and credentials
# Apps that need S3 access dependsOn this role
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: role-storage
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: role-ingress
    - name: role-certificates
  sourceRef:
    kind: GitRepository
    name: okdp-sandbox
  path: ./clusters/sandbox/infra/seaweedfs
  prune: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
      - kind: ConfigMap
        name: storage-vars
