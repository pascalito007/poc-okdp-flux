# Role: Identity (Authentication & Authorization)
# Deploys Keycloak with realm, users, groups, OIDC clients
# Apps that need OIDC authentication dependsOn this role
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: role-identity
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: role-database-server
    - name: role-ingress
    - name: role-certificates
  sourceRef:
    kind: GitRepository
    name: okdp-sandbox
  path: ./clusters/sandbox/infra/keycloak
  prune: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
      - kind: ConfigMap
        name: identity-vars
