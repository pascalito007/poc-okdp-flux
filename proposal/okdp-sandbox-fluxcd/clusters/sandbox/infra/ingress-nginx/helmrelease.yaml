# ingress-nginx HelmRelease
# Deployed by role-ingress Kustomization
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 5m
  chart:
    spec:
      chart: ingress-nginx
      version: "4.12.1"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controller:
      ingressClassResource:
        name: ${OKDP_INGRESS_CLASS}
      service:
        type: NodePort
        nodePorts:
          http: 30080
          https: 30443
      config:
        proxy-body-size: "130m"
        proxy-connect-timeout: "300"
        proxy-read-timeout: "300"
        proxy-send-timeout: "300"
