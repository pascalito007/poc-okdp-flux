---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: okdp-examples
  namespace: flux-system
spec:
  interval: 30m
  url: oci://quay.io/okdp/charts/okdp-examples
  ref:
    semver: ">=1.1.0"
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
