# Self-signed CA bootstrap and ClusterIssuer
# Variables substituted by postBuild from cluster-vars ConfigMap
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: okdp-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: "${OKDP_CA_COMMON_NAME}"
  subject:
    organizations:
      - "${OKDP_CA_ORGANIZATION}"
    countries:
      - "${OKDP_CA_COUNTRY}"
  duration: "${OKDP_CA_VALIDITY}"
  privateKey:
    algorithm: ECDSA
    size: 256
  secretName: ${OKDP_CLUSTER_ISSUER}
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ${OKDP_CLUSTER_ISSUER}
spec:
  ca:
    secretName: ${OKDP_CLUSTER_ISSUER}
