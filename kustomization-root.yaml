# ============================================================
# Sub-Kustomizations managed from git by poc-root.
# poc-root (path: ./) applies:
#   - platform-vars.yaml  → ConfigMap
#   - kustomization-root.yaml → these 3 Kustomization CRs
#
# When this file changes in git, poc-root reconciles it and
# updates the sub-Kustomization specs automatically.
# No manual kubectl apply needed after initial bootstrap.
# ============================================================

# 1. Sources — HelmRepository must exist before HelmReleases
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: poc-sources
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: okdp-sandbox-poc
  path: ./sources
  prune: true

# 2. Spark History Server
#    Change path to overlays/without-proxy to disable the proxy.
#    This is the only line to edit — push to git, Flux does the rest.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: poc-spark-history-server
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: okdp-sandbox-poc
  path: ./spark-history-server/overlays/with-proxy
  prune: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-vars
        optional: false
  dependsOn:
    - name: poc-sources

# 3. Hive Metastore
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: poc-hive-metastore
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: okdp-sandbox-poc
  path: ./hive-metastore
  prune: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-vars
        optional: false
  dependsOn:
    - name: poc-sources
