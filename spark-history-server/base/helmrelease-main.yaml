# ============================================================
# BEFORE (KuboCD): clusters/sandbox/ (no Release file exists yet —
#   spark-history-server is available as a package but not deployed
#   in the sandbox). The equivalent KuboCD Release would be:
#
#   apiVersion: kubocd.kubotal.io/v1alpha1
#   kind: Release
#   metadata:
#     name: spark-history-server
#     namespace: kubocd-system
#   spec:
#     targetNamespace: default
#     package:
#       source:
#         oci:
#           repository: quay.io/okdp/charts/spark-history-server
#           tag: 1.0.0
#     parameters:
#       eventsLogDir: s3a://spark-events/event-logs/
#       adminGroups: admins
#       enableWebProxy: true
#
#   KuboCD then renders the package's Go template with the Context,
#   producing a HelmRelease named "spark-history-server-main".
#   All Context lookups (.Context.sparkHistory.*, .Context.ingress.*,
#   .Release.*) are resolved at controller render time.
#
# AFTER (pure Flux): explicit HelmRelease with ${VAR} placeholders.
#   FluxCD postBuild.substituteFrom replaces ${VAR} from platform-vars
#   ConfigMap AFTER kustomize processing, before applying to cluster.
#   No controller needed — kustomize-controller handles it natively.
# ============================================================
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spark-history-server-main
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  targetNamespace: ${TARGET_NAMESPACE}
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  chart:
    spec:
      # BEFORE: source.oci.repository: quay.io/okdp/charts/spark-history-server
      #         source.oci.tag: 1.0.0
      # AFTER:  standard HelmRelease chart ref — shared okdp-oci-charts HelmRepository
      chart: spark-history-server
      version: "1.0.0"
      sourceRef:
        kind: HelmRepository
        name: okdp-oci-charts
        namespace: flux-system
  values:
    # fullnameOverride controls all resource names generated by the chart (Deployment, Service, etc.)
    # service.name explicitly pins the Service name — belt-and-suspenders, in case the chart
    # has its own service naming logic that ignores fullnameOverride.
    # Both must match SPARK_WEB_PROXY_SERVICE_HOST in platform-vars.
    fullnameOverride: spark-history-server-main
    service:
      name: spark-history-server-main
      type: ClusterIP
      port: 18080

    image:
      repository: quay.io/okdp/spark
      pullPolicy: IfNotPresent
      tag: "spark-3.5.6-scala-2.12-java-17"

    ingress:
      enabled: true
      ingressClassName: "nginx"
      annotations:
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        # BEFORE: cert-manager.io/cluster-issuer: {{ .Context.certificateIssuers.selfSigned.name }}
        cert-manager.io/cluster-issuer: ${CERT_ISSUER}
      hosts:
        # BEFORE: host: {{ $historyEndpointHost }}
        #   resolved from: .Context.sparkHistory.endpoint.url with .Release.namespace + .Context.ingress.suffix
        - host: ${SPARK_HISTORY_ENDPOINT_HOST}
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - ${SPARK_HISTORY_ENDPOINT_HOST}
          # BEFORE: secretName: {{ .Release.metadata.name }}-tls → "spark-history-server-tls"
          secretName: spark-history-server-main-tls

    config:
      # BEFORE: spark.hadoop.fs.s3a.endpoint: {{ $s3ApiUrl }}
      #   $s3ApiUrl = .Context.sparkHistory.storage.s3.apiUrl with namespace/suffix substituted
      spark.hadoop.fs.s3a.endpoint: ${SPARK_HISTORY_S3_API_URL}
      spark.hadoop.fs.s3a.connection.ssl.enabled: true
      # BEFORE: spark.history.fs.logDirectory: {{ .Parameters.eventsLogDir }}
      spark.history.fs.logDirectory: s3a://spark-events/event-logs/
      spark.hadoop.fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
      spark.hadoop.fs.s3a.path.style.access: true
      spark.ui.filters: io.okdp.spark.authc.OidcAuthFilter
      spark.user.groups.mapping: io.okdp.spark.authz.OidcGroupMappingServiceProvider
      spark.history.ui.acls.enable: true
      # BEFORE: {{ $keycloakIssuerUri }} resolved from .Context.sparkHistory.auth.oidc.issuerUri
      spark.io.okdp.spark.authc.OidcAuthFilter.param.issuer-uri: ${SPARK_HISTORY_OIDC_ISSUER_URI}
      # BEFORE: redirect-uri computed as: proxy URL if enableWebProxy else history URL
      # AFTER: single ${VAR} — set in platform-vars alongside the overlay path switch
      spark.io.okdp.spark.authc.OidcAuthFilter.param.redirect-uri: ${SPARK_HISTORY_OIDC_REDIRECT_URI}
      # BEFORE: .Context.sparkHistory.auth.oidc.scope
      spark.io.okdp.spark.authc.OidcAuthFilter.param.scope: ${SPARK_HISTORY_OIDC_SCOPE}
      spark.io.okdp.spark.authc.OidcAuthFilter.param.cookie-max-age-minutes: 480
      spark.io.okdp.spark.authc.OidcAuthFilter.param.cookie-cipher-secret-key: FC5E81345CED0E256DC42E410362FF6E
      spark.io.okdp.spark.authc.OidcAuthFilter.param.cookie-is-secure: true
      # BEFORE: .Context.sparkHistory.auth.oidc.usePKCE → true
      spark.io.okdp.spark.authc.OidcAuthFilter.param.use-pkce: true
      spark.io.okdp.spark.authc.OidcAuthFilter.param.user-id: email
      # BEFORE: .Parameters.adminGroups → "admins"
      spark.history.ui.admin.acls.groups: admins

    extraEnvs:
      # BEFORE: {{- if .Context.sparkHistory.storage.s3.tls.insecureSkipVerify }}
      #   (always true in sandbox context)
      - name: SPARK_HISTORY_OPTS
        value: "-Dcom.amazonaws.sdk.disableCertChecking=true"
      # BEFORE: secretKeyRef.name: {{ .Context.sparkHistory.storage.s3.credentialsSecret.name }}
      #         secretKeyRef.key:  {{ .Context.sparkHistory.storage.s3.credentialsSecret.accessKeyKey }}
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: ${SPARK_HISTORY_S3_CREDS_SECRET}
            key: accessKey
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: ${SPARK_HISTORY_S3_CREDS_SECRET}
            key: secretKey
      - name: JAVA_TOOL_OPTIONS
        value: "-Djavax.net.ssl.trustStore=/cacerts/bundle.p12 -Djavax.net.ssl.trustStorePassword="
      # BEFORE: secretKeyRef.name: {{ .Context.sparkHistory.auth.oidc.credentialsSecret.name }}
      #         key: {{ .Context.sparkHistory.auth.oidc.credentialsSecret.clientIdKey }}
      - name: AUTH_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: ${SPARK_HISTORY_OIDC_CREDS_SECRET}
            key: client_id
      - name: AUTH_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: ${SPARK_HISTORY_OIDC_CREDS_SECRET}
            key: client_secret

    extraVolumes:
      - name: cacerts
        secret:
          secretName: certs-bundle

    extraVolumeMounts:
      - name: cacerts
        mountPath: /cacerts
