# ============================================================
# BEFORE (KuboCD): the Release CR is the deploy unit.
#   KuboCD watches Releases + Contexts, renders templates, and
#   creates OCIRepository + HelmRelease Flux objects internally.
#   Cross-service binding is via semantic roles (identity, storage,
#   ingress) — KuboCD resolves the actual dependency names.
#
# AFTER (pure Flux): this Kustomization CR is the deploy unit.
#   - sourceRef: points to your bootstrapped GitRepository
#   - path: selects the overlay (controls proxy on/off)
#   - postBuild.substituteFrom: resolves all ${VAR} from platform-vars
#   - dependsOn: explicit resource names (no role abstraction)
#
# postBuild.substituteFrom replaces ${VAR} in all manifests
# AFTER kustomize rendering but BEFORE applying to the cluster.
# This is the Flux-native equivalent of KuboCD's Context injection.
# ============================================================
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spark-history-server
  namespace: flux-system
spec:
  interval: 10m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    # Update to your bootstrapped GitRepository name (typically "flux-system")
    name: flux-system
    namespace: flux-system
  # ── Proxy switch ──────────────────────────────────────────
  # Change to overlays/without-proxy to disable the web proxy module.
  # BEFORE (KuboCD): set parameters.enableWebProxy: false in the Release CR
  #   (but the conditional was not actually implemented — always deployed).
  # AFTER: change this one line — kustomize excludes helmrelease-proxy.yaml.
  path: ./poc/spark-history-server/overlays/with-proxy
  prune: true
  wait: true
  # ── Variable injection ────────────────────────────────────
  # BEFORE (KuboCD): Context CR fields evaluated as Go templates
  #   e.g.: apiUrl: "https://seaweedfs-{{ .Release.namespace }}.{{ .Context.ingress.suffix }}"
  # AFTER: flat ${VAR} substitution from platform-vars ConfigMap.
  #   Changing domain = edit platform-vars.yaml, one place.
  postBuild:
    substituteFrom:
      # SubstituteReference fields: kind, name, optional (no namespace field).
      # The ConfigMap is always read from the Kustomization's own namespace (flux-system).
      - kind: ConfigMap
        name: platform-vars
        optional: false
  # ── Dependency ordering ───────────────────────────────────
  # BEFORE (KuboCD): dependencies: [identity, storage, ingress]
  #   KuboCD resolves role → Release name automatically.
  # AFTER: explicit Kustomization resource names in flux-system.
  #   These MUST match actual FluxCD Kustomization object names in your cluster.
  #   If a referenced Kustomization does not exist, Flux blocks indefinitely.
  #   For a standalone PoC, comment these out and deploy manually in order.
  dependsOn:
    - name: keycloak        # KuboCD role: identity → adapt to your Kustomization name
    - name: ingress-nginx   # KuboCD role: ingress  → adapt to your Kustomization name
    # - name: seaweedfs     # KuboCD role: storage  → add if seaweedfs managed by Flux
