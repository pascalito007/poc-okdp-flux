# ============================================================
# without-proxy overlay: deploys only the spark-history-server
# main module. No web proxy.
#
# To activate:
#   1. Set spec.path in kustomization-flux.yaml to:
#        ./poc/spark-history-server/overlays/without-proxy
#   2. Update SPARK_HISTORY_OIDC_REDIRECT_URI in platform-vars.yaml to:
#        SPARK_HISTORY_OIDC_REDIRECT_URI: "https://spark-history-default.okdp.sandbox/home"
#      (the OIDC redirect must point to the history server directly, not the proxy)
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base  # only helmrelease-main.yaml (proxy excluded → gets pruned if previously deployed)
